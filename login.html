<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RailIQ Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="centered">
  <section class="card auth-card">
    <h1>🚆 RailIQ Login</h1>
    <p class="muted">Login with backend auth to access dashboard.</p>
    <label for="email">Email</label>
    <input id="email" type="email" placeholder="you@example.com" />
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" />
    <button id="loginBtn" class="primary full">Login</button>
    <p id="loginMessage" class="muted"></p>
    <p class="muted">New user? <a href="signup.html">Create account</a></p>
  </section>
  <script src="auth.js"></script>
</body>
</html>
