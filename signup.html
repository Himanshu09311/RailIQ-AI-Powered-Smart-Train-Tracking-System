<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RailIQ Signup</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="centered">
  <section class="card auth-card">
    <h1>📝 Create RailIQ Account</h1>
    <p class="muted">Signup with backend validation and secure auth flow.</p>

    <label for="name">Full Name</label>
    <input id="name" type="text" placeholder="Rohit Sharma" />

    <label for="signupEmail">Email</label>
    <input id="signupEmail" type="email" placeholder="you@example.com" />

    <label for="signupPassword">Password</label>
    <input id="signupPassword" type="password" placeholder="Min 8 chars, 1 number" />

    <label for="confirmPassword">Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Re-enter password" />

    <button id="signupBtn" class="primary full">Create Account</button>
    <p id="signupMessage" class="muted"></p>
    <p class="muted">Already have account? <a href="login.html">Login</a></p>
  </section>
  <script src="auth.js"></script>
</body>
</html>
